server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Google public DNS — required for dynamic proxy_pass with a variable
    resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;
    resolver_timeout 5s;

    # Proxy /api/* to the Cloud Run gateway (HTTPS)
    location /api/ {
        set $gateway_upstream ${GATEWAY_URL};
        proxy_pass $gateway_upstream;

        # SNI is required when proxy_pass target uses a variable
        proxy_ssl_server_name on;
        proxy_ssl_session_reuse off;

        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $proxy_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
