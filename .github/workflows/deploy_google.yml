name: Build, Push & Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION:     ${{ vars.GCP_REGION || 'us-central1' }}
  AR_REPO:    laundriq

jobs:
  # ── Detect which paths changed ─────────────────────────────────────────────
  # any-app controls whether build-and-push runs at all.
  # Per-service flags control whether each image is rebuilt or just re-tagged.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      auth-service:     ${{ steps.filter.outputs.auth-service }}
      customer-service: ${{ steps.filter.outputs.customer-service }}
      order-service:    ${{ steps.filter.outputs.order-service }}
      payment-service:  ${{ steps.filter.outputs.payment-service }}
      gateway:          ${{ steps.filter.outputs.gateway }}
      frontend:         ${{ steps.filter.outputs.frontend }}
      any-app:          ${{ steps.filter.outputs.any-app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'backend/auth-service/**'
              - 'backend/common/**'
              - 'backend/grpc-lib/**'
              - 'backend/pom.xml'
            customer-service:
              - 'backend/customer-service/**'
              - 'backend/common/**'
              - 'backend/grpc-lib/**'
              - 'backend/pom.xml'
            order-service:
              - 'backend/order-service/**'
              - 'backend/common/**'
              - 'backend/grpc-lib/**'
              - 'backend/pom.xml'
            payment-service:
              - 'backend/payment-service/**'
              - 'backend/common/**'
              - 'backend/grpc-lib/**'
              - 'backend/pom.xml'
            gateway:
              - 'backend/gateway/**'
              - 'backend/common/**'
              - 'backend/pom.xml'
            frontend:
              - 'frontend/**'
            any-app:
              - 'backend/**'
              - 'frontend/**'
              - 'infra/google/deploy/**'

  # ── Build changed images; re-tag unchanged ones ────────────────────────────
  # Skipped entirely when only infra/ files changed.
  #
  # Unchanged services are re-tagged :latest → :<sha> in Artifact Registry.
  # This is instant (no layer push) and gives Terraform a consistent image_tag
  # to use across all services on every deploy.
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any-app == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── auth-service ───────────────────────────────────────────────────────

      - name: Build & push auth-service
        if: needs.changes.outputs.auth-service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/auth-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/auth-service:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/auth-service:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      - name: Re-tag auth-service (unchanged)
        if: needs.changes.outputs.auth-service == 'false'
        run: |
          gcloud artifacts docker tags add \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/auth-service:latest \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/auth-service:${{ github.sha }}

      # ── customer-service ───────────────────────────────────────────────────

      - name: Build & push customer-service
        if: needs.changes.outputs.customer-service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/customer-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/customer-service:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/customer-service:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      - name: Re-tag customer-service (unchanged)
        if: needs.changes.outputs.customer-service == 'false'
        run: |
          gcloud artifacts docker tags add \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/customer-service:latest \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/customer-service:${{ github.sha }}

      # ── order-service ──────────────────────────────────────────────────────

      - name: Build & push order-service
        if: needs.changes.outputs.order-service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/order-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/order-service:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/order-service:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      - name: Re-tag order-service (unchanged)
        if: needs.changes.outputs.order-service == 'false'
        run: |
          gcloud artifacts docker tags add \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/order-service:latest \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/order-service:${{ github.sha }}

      # ── payment-service ────────────────────────────────────────────────────

      - name: Build & push payment-service
        if: needs.changes.outputs.payment-service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/payment-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/payment-service:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/payment-service:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      - name: Re-tag payment-service (unchanged)
        if: needs.changes.outputs.payment-service == 'false'
        run: |
          gcloud artifacts docker tags add \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/payment-service:latest \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/payment-service:${{ github.sha }}

      # ── gateway ────────────────────────────────────────────────────────────

      - name: Build & push gateway
        if: needs.changes.outputs.gateway == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/gateway/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/gateway:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/gateway:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      - name: Re-tag gateway (unchanged)
        if: needs.changes.outputs.gateway == 'false'
        run: |
          gcloud artifacts docker tags add \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/gateway:latest \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/gateway:${{ github.sha }}

      # ── frontend ───────────────────────────────────────────────────────────

      - name: Build & push frontend
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/frontend:latest
          build-args: |
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            VITE_API_BASE_URL=
            NGINX_CONF=nginx.gcp.conf
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend

      - name: Re-tag frontend (unchanged)
        if: needs.changes.outputs.frontend == 'false'
        run: |
          gcloud artifacts docker tags add \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/frontend:latest \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}

  # ── Deploy to Cloud Run via Terraform ────────────────────────────────────
  # Always runs on every push to main UNLESS build-and-push explicitly failed.
  # This ensures terraform changes (cloud_run.tf, workflow edits, etc.) are
  # always applied even when no app code changed.
  #
  # image_tag logic:
  #   - build-and-push ran   → use commit SHA (images just pushed)
  #   - build-and-push skipped → use "latest" (terraform config changed only;
  #                               Cloud Run keeps the existing image)
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: [changes, build-and-push]
    if: always() && needs.build-and-push.result != 'failure'

    defaults:
      run:
        working-directory: infra/google/deploy

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}"

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="region=${{ env.REGION }}" \
            -var="image_tag=${{ needs.build-and-push.result == 'success' && github.sha || 'latest' }}"
