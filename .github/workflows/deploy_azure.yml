# DEPRECATED — deployment has moved to Google Cloud Run (deploy_google.yml).
# This workflow is disabled.
name: Build & Push to Azure Container Registry

on:
  workflow_dispatch:  # manual trigger only; no longer runs on push

jobs:
  # ──────────────────────────────────────────────
  # Build Docker images and push to ACR
  # ──────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend services (sequential to share Maven cache layers) ──

      - name: Build and push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/auth-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/auth-service:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/auth-service:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push customer-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/customer-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/customer-service:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/customer-service:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push order-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/order-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/order-service:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push payment-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/payment-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/payment-service:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/payment-service:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/gateway/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/gateway:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/gateway:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── Frontend ──

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
          build-args: |
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            VITE_API_BASE_URL=
            NGINX_CONF=nginx.azure.conf
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
