# Payment Service Configuration
spring.application.name=payment-service
server.port=8083

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/paymentdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:ctse}
spring.datasource.password=${DB_PASSWORD:ctse_password}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Stripe
stripe.api.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}

# Order Service (for cross-service validation)
order-service.base-url=${ORDER_SERVICE_URL:http://localhost:8082}
