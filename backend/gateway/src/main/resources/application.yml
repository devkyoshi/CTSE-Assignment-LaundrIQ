server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: pricing-service
          uri: ${PRICING_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/pricing/**
          filters:
            - StripPrefix=0

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: health, info, routes
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
