# Order Service Configuration
spring.application.name=order-service
server.port=8082

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/orderdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:ctse}
spring.datasource.password=${DB_PASSWORD:ctse_password}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# gRPC (Customer Service)
customer-service.grpc.host=${CUSTOMER_SERVICE_GRPC_HOST:localhost}
customer-service.grpc.port=${CUSTOMER_SERVICE_GRPC_PORT:9096}
