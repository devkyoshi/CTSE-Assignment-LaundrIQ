# Auth Service Configuration
spring.application.name=auth-service
server.port=8084

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/authdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:ctse}
spring.datasource.password=${DB_PASSWORD:ctse_password}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLXNlY3JldC1rZXktZm9yLWxhdW5kcnktYXBw}
jwt.expiration-ms=86400000

# gRPC server port
grpc.server.port=9094
grpc.server.address=0.0.0.0

# Default Admin User
admin.username=${ADMIN_USERNAME:admin}
admin.email=${ADMIN_EMAIL:admin@mail.com}
admin.password=${ADMIN_PASSWORD:admin@1234}
